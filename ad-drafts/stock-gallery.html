<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, Arial, sans-serif; background: #16222E; color: #fff; padding: 24px; }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p { color: #aaa; margin-bottom: 20px; font-size: 14px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { background: #1B2B3A; border-radius: 12px; overflow: hidden; border: 2px solid transparent; }
  .card img { width: 100%; height: 220px; object-fit: cover; display: block; }
  .card .label { padding: 10px 12px; font-size: 15px; font-weight: 700; color: #D5BC88; }
</style>
</head>
<body>
  <h1>Stock-kandidater — Pexels (gratis kommersiell lisens, OK for annonser)</h1>
  <p>Velg nummer. Alle kan beskjæres til 1080×1080 og få GDTS-overlegg (pris, hook, logo).</p>
  <div class="grid">
    <div class="card"><img src="https://images.pexels.com/photos/4350225/pexels-photo-4350225.jpeg?auto=compress&w=600"><div class="label">#1 Tannlege + pasient (behandling)</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/5622235/pexels-photo-5622235.jpeg?auto=compress&w=600"><div class="label">#2</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/6502341/pexels-photo-6502341.jpeg?auto=compress&w=600"><div class="label">#3</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/10566139/pexels-photo-10566139.jpeg?auto=compress&w=600"><div class="label">#4</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/7298650/pexels-photo-7298650.jpeg?auto=compress&w=600"><div class="label">#5</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/6232009/pexels-photo-6232009.jpeg?auto=compress&w=600"><div class="label">#6</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/6084178/pexels-photo-6084178.jpeg?auto=compress&w=600"><div class="label">#7</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/6919280/pexels-photo-6919280.jpeg?auto=compress&w=600"><div class="label">#8</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/3762402/pexels-photo-3762402.jpeg?auto=compress&w=600"><div class="label">#9 Smil (nærbilde)</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/65665/smile-mouth-teeth-laugh-65665.jpeg?auto=compress&w=600"><div class="label">#10 Smil</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/69833/smile-laugh-girl-teeth-69833.jpeg?auto=compress&w=600"><div class="label">#11 Smil</div></div>
    <div class="card"><img src="https://images.pexels.com/photos/28110692/pexels-photo-28110692/free-photo-of-men-smiling-close-up.jpeg?auto=compress&w=600"><div class="label">#12 Smil (mann)</div></div>
  </div>
</body>
</html>
